<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sass Boilerplate</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- Start Topbar Area -->
    <div class="ed-topbar">
        <div class="container ed-container-expand">
            <div class="ed-topbar__inner">
                <!-- Logo -->
                <div class="ed-topbar__logo">
                    <a href="index.html">
                        <img src="assets/images/logo.svg" alt="Logo">
                    </a>
                </div>
                <!-- Caregory Dropdown -->
                <div class="ed-topbar__search-widget">
                    <div class="ed-topbar__category">
                        <select name="" id="">
                            <option data-display="All Categories">All Categories</option>
                            <option value="1">Business</option>
                            <option value="1">Business</option>
                            <option value="1">Business</option>
                            <option value="1">Business</option>
                            <option value="1">Business</option>
                            <option value="1">Business</option>
                            <option value="1">Business</option>
                        </select>
                    </div>
                    <div class="ed-topbar__search">
                        <form action="#" method="post">
                            <input type="search" name="search" placeholder="Search your concerm......">
                            <button type="submit"><i class="fi-rr-search"></i>  Search</button>
                        </form>
                    </div>
                </div>
                <!-- Topbar Info -->
                <div class="ed-topbar__info">
                    <!-- Topbar Social  -->
                    <ul class="ed-topbar__info-social">
                        <li>
                            <a href="#" target="_blank">
                                <img src="assets/images/icons/icon-dark-facebook.svg" alt="">
                            </a>
                        </li>
                        <li>
                            <a href="#" target="_blank">
                                <img src="assets/images/icons/icon-dark-dribbble.svg" alt="">
                            </a>
                        </li>
                        <li>
                            <a href="#" target="_blank">
                                <img src="assets/images/icons/icon-dark-instagram.svg" alt="">
                            </a>
                        </li>
                        <li>
                            <a href="#" target="_blank">
                                <img src="assets/images/icons/icon-dark-twitter.svg" alt="">
                            </a>
                        </li>
                    </ul>
                    <!-- Topbar Button -->
                    <div class="ed-topbar__info-buttons">
                        <button type="button" class="register-btn">
                            Register
                        </button>
                        <button type="button" class="login-btn">
                            Log In
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- End Topbar Area -->
    <header class="main-header">
    </header>

    <main class="welcome-section">
        <h1>Welcome!</h1>
        <p>This is a boilerplate project using the 7-1 Sass architecture.</p>
        <a href="#" class="btn">Click Me</a>
